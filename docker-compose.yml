# ============================================================
# SQL Injection Protector — Docker Compose (Development)
# ============================================================
# Usage:
#   docker-compose up --build        # Build and start
#   docker-compose up -d             # Detached mode
#   docker-compose logs -f api       # Follow logs
#   docker-compose down              # Stop and remove
# ============================================================

services:
  # ── Redis (optional distributed backend) ─────────────────────────────────
  # Enable: docker-compose up --profile redis
  # The API service will automatically use Redis when SQLI_BACKEND=redis.
  redis:
    image: redis:7.2-alpine
    container_name: sqli-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save ""
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    profiles:
      - redis
      - full

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sqli-protector-api
    ports:
      - "${API_PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - INCIDENTS_DB=/app/data/incidents.db
      # Redis backend (activated when SQLI_BACKEND=redis in .env)
      - SQLI_BACKEND=${SQLI_BACKEND:-sqlite}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    volumes:
      # Persist incident database + SQLite state across restarts
      - sqli-data:/app/data
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
        required: false   # redis is optional — API starts without it
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"

  # Optional: Prometheus monitoring
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: sqli-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      api:
        condition: service_healthy
    profiles:
      - monitoring

  # Optional: Streamlit demo UI
  demo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sqli-protector-demo
    ports:
      - "8501:8501"
    env_file:
      - .env
    command: ["streamlit", "run", "streamlit_demo.py", "--server.port=8501", "--server.address=0.0.0.0"]
    depends_on:
      api:
        condition: service_healthy
    profiles:
      - demo

volumes:
  sqli-data:
    driver: local
  prometheus-data:
    driver: local

# ── Usage profiles ────────────────────────────────────────────────────────────
# docker-compose up                            # API only (SQLite backend)
# docker-compose --profile redis up            # API + Redis backend
# docker-compose --profile monitoring up       # API + Prometheus
# docker-compose --profile demo up             # API + Streamlit demo
# docker-compose --profile full up             # API + Redis + Prometheus + Demo
