# ============================================================
# SQL Injection Protector — CI Pipeline
# ============================================================
# Runs on every push and PR to main.
# Steps: lint -> test -> docker build
# ============================================================

name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with ruff
        run: |
          ruff check \
            sql_injection_detector.py \
            api_server.py \
            incident_logger.py \
            logger.py \
            config.py \
            metrics.py \
            tests/test_detector.py \
            tests/test_api.py

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short -q

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t sqli-protector:${{ github.sha }} .

      - name: Verify Docker health
        run: |
          docker run -d --name sqli-test \
            -p 5000:5000 \
            -e API_KEY=test-key \
            sqli-protector:${{ github.sha }}

          # Wait for container to be healthy
          for i in $(seq 1 30); do
            if docker exec sqli-test python -c "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')" 2>/dev/null; then
              echo "Health check passed!"
              break
            fi
            echo "Waiting for container... ($i/30)"
            sleep 2
          done

          # Verify API responds
          docker exec sqli-test python -c "
          import urllib.request, json
          resp = urllib.request.urlopen('http://localhost:5000/api/health')
          data = json.loads(resp.read())
          assert data['status'] == 'ok', f'Unexpected status: {data}'
          print('API health check: OK')
          print(f'Models: {data[\"models\"]}')
          "

          docker stop sqli-test
          docker rm sqli-test
