# ============================================================
# Prometheus Configuration for SQL Injection Protector
# ============================================================
# Usage: docker-compose --profile monitoring up
# ============================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "sqli-protector"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:5000"]
        labels:
          service: "sqli-protector"
          environment: "production"
